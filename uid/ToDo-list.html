<html>
    <head>
        <title>To-Do List</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                background: #f4f4f4;
            }

            input {
                padding: 10px;
                width: 250px;
                border: 2px solid #512da8;
                border-radius: 5px;
                outline: none;
            }

            button {
                padding: 10px 15px;
                margin-left: 10px;
                border: none;
                background: linear-gradient(to right, #6c0094, #512da8);
                color: white;
                border-radius: 5px;
                cursor: pointer;
                transition: background 0.3s ease-in-out, transform 0.2s;
            }

            button:hover {
                background: linear-gradient(to right, #512da8, #6c0094);
                transform: scale(1.05);
            }

            .js-can {
                margin-top: 20px;
                width: 300px;
            }

            .todo-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                background: white;
                padding: 10px;
                margin: 5px 0;
                border-radius: 5px;
                box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
                transition: transform 0.2s ease-in-out;
            }

            .todo-item:hover {
                transform: scale(1.02);
            }

            .remove-btn {
                background: red;
                padding: 5px 10px;
                border: none;
                color: white;
                border-radius: 5px;
                cursor: pointer;
                transition: background 0.3s, transform 0.2s;
            }

            .remove-btn:hover {
                background: darkred;
                transform: scale(1.1);
            }
            h1{
                font-size: xx-large;
                color: #512da8;
            }
        </style>
    </head>
    <body>
        <h1><center>To-Do List</center></h1>
        <input type="text" class="js-todo">
        <button onclick="addTodo()">Add</button>
        <div class="js-can"></div>

        <script>
            let arr = [];
             
            function addTodo() {
                const inputValue = document.querySelector('.js-todo').value.trim();
                
                if (inputValue !== '') { 
                    arr.push(inputValue);
                    document.querySelector('.js-todo').value = ''; 
                    renderTodos();
                }
            }

            function removeTodo(index) {
                arr.splice(index, 1); 
                renderTodos();
            }

            function renderTodos() {
                let todoHTML = '';

                for (let i = 0; i < arr.length; i++) {
                    todoHTML += `
                        <div class="todo-item">
                            <p>${arr[i]}</p>
                            <button class="remove-btn" onclick="removeTodo(${i})">Remove</button>
                        </div>
                    `;
                }

                document.querySelector('.js-can').innerHTML = todoHTML;
            }
        </script>
    </body>
</html>
