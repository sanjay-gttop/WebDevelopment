<html>
    <head>
        <title>Login Page</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
        <link rel="stylesheet" href="project-CSS/style.css">
    </head>
    <body>
        <div class="container" id="container">
            <!-- Sign Up Form -->
            <div class="form-container sign-up">
                <form id="signup-form">
                    <h1>Create Account</h1>
                    <div class="social-icons">
                        <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
                        <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
                        <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
                        <a href="#" class="icon"><i class="fa-brands fa-linkedin-in"></i></a>
                    </div>
                    <span>or use your email for registration</span>
                    <input type="text" id="nameis" placeholder="Name">
                    <span class="error"></span>
                    <input type="email" id="email-signup" placeholder="Email">
                    <span class="error"></span>
                    <input type="password" id="password-signup" placeholder="Password">
                    <span class="error"></span>
                    <button type="submit" class="button">Sign Up</button>
                </form>
            </div>

            <!-- Sign In Form -->
            <div class="form-container sign-in">
                <form id="signin-form">
                    <h1>Sign In</h1>
                    <div class="social-icons">
                        <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
                        <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
                        <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
                        <a href="#" class="icon"><i class="fa-brands fa-linkedin-in"></i></a>
                    </div>
                    <span>or use your email and password</span>
                    <input type="email" id="email-signin" placeholder="Email">
                    <span class="error"></span>
                    <input type="password" id="password-signin" placeholder="Password">
                    <span class="error"></span>
                    <a href="#">Forgot Password?</a>
                    <button type="submit" class="button">Sign In</button>
                </form>
            </div>

            <!-- Toggle Panels -->
            <div class="toggle-container">
                <div class="toggle">
                    <div class="toggle-panel toggle-left">
                        <h1>Welcome Back</h1>
                        <p>Enter your personal details to use all of the site features</p>
                        <button class="hidden" id="login">Sign In</button>
                    </div>
                    <div class="toggle-panel toggle-right">
                        <h1>Hello, Friend</h1>
                        <p>Register with your personal details to use all of the site features</p>
                        <button class="hidden" id="register">Sign Up</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="project-js/script.js"></script>
    </body>
</html>
